<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" fill="none">
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <!-- Terminal chrome -->
  <rect width="840" height="400" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect width="840" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="840" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>
  <text x="420" y="23" text-anchor="middle" font-size="12" fill="#484f58">nostr-core</text>

  <!-- ASCII logo -->
  <text x="40" y="80" font-size="16" font-weight="bold" fill="#f97316" xml:space="preserve">                    _                                  </text>
  <text x="40" y="98" font-size="16" font-weight="bold" fill="#f97316" xml:space="preserve">  _ __   ___  ___| |_ _ __       ___ ___  _ __ ___    </text>
  <text x="40" y="116" font-size="16" font-weight="bold" fill="#f97316" xml:space="preserve"> | '_ \ / _ \/ __| __| '__|____ / __/ _ \| '__/ _ \   </text>
  <text x="40" y="134" font-size="16" font-weight="bold" fill="#f97316" xml:space="preserve"> | | | | (_) \__ \ |_| | |_____| (_| (_) | | |  __/   </text>
  <text x="40" y="152" font-size="16" font-weight="bold" fill="#f97316" xml:space="preserve"> |_| |_|\___/|___/\__|_|        \___\___/|_|  \___|   </text>

  <!-- Taglines -->
  <text x="40" y="184" font-size="15" fill="#58a6ff">Dead-simple &amp; vendor-neutral Nostr toolkit</text>
  <text x="40" y="204" font-size="13" fill="#8b949e">48 NIPs · NWC payments · TypeScript native · zero vendor lock-in</text>
  <text x="40" y="224" font-size="11" fill="#484f58">ESM-only  |  Node 18+ · Deno · Bun · Cloudflare Workers</text>

  <!-- Separator -->
  <line x1="40" y1="244" x2="800" y2="244" stroke="#21262d" stroke-width="1"/>

  <!-- Status section - clean two-column layout -->
  <text x="40" y="272" font-size="12" fill="#8b949e">NIPs</text>
  <text x="140" y="272" font-size="12" fill="#27c93f" font-weight="bold">48 implemented</text>

  <text x="40" y="296" font-size="12" fill="#8b949e">Crypto</text>
  <text x="140" y="296" font-size="12" fill="#c9d1d9">audited noble libraries</text>

  <text x="40" y="320" font-size="12" fill="#8b949e">Deps</text>
  <text x="140" y="320" font-size="12" fill="#c9d1d9">79 packages · 118 MB</text>

  <text x="440" y="272" font-size="12" fill="#8b949e">API</text>
  <text x="540" y="272" font-size="12" fill="#f97316">NWC · Relay · Signer · Events</text>

  <text x="440" y="296" font-size="12" fill="#8b949e">License</text>
  <text x="540" y="296" font-size="12" fill="#c9d1d9">MIT</text>

  <text x="440" y="320" font-size="12" fill="#8b949e">Lock-in</text>
  <text x="540" y="320" font-size="12" fill="#27c93f">none</text>

  <!-- Separator -->
  <line x1="40" y1="340" x2="800" y2="340" stroke="#21262d" stroke-width="1"/>

  <!-- Flow -->
  <text x="40"  y="370" font-size="12" fill="#8b949e">App</text>
  <text x="80" y="370" font-size="12" fill="#f97316">---import---&gt;</text>
  <text x="200" y="370" font-size="12" fill="#c9d1d9" font-weight="bold">nostr-core</text>
  <text x="310" y="370" font-size="12" fill="#58a6ff">---NWC---&gt;</text>
  <text x="410" y="370" font-size="12" fill="#8b949e">Wallet</text>
  <text x="470" y="370" font-size="12" fill="#ffbd2e">---Lightning---&gt;</text>
  <text x="630" y="370" font-size="12" fill="#8b949e">Network</text>

  <!-- Bottom accent -->
  <rect y="396" width="840" height="4" rx="0" fill="#f97316"/>
</svg>
