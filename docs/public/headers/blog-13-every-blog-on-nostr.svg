<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f1319"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#FFCA4A"/>
      <stop offset="100%" stop-color="#897FFF"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#FFCA4A"/>
    </linearGradient>
    <linearGradient id="cardEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <radialGradient id="emblemGlow" cx="893" cy="305" r="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#897FFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <!-- Background -->
  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Ambient glow -->
  <ellipse cx="893" cy="305" rx="330" ry="290" fill="url(#emblemGlow)"/>

  <!-- Terminal chrome -->
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Faint grid lines -->
  <line x1="620" y1="80" x2="620" y2="560" stroke="#1c2128" stroke-width="1"/>
  <line x1="780" y1="80" x2="780" y2="560" stroke="#1c2128" stroke-width="1"/>
  <line x1="940" y1="80" x2="940" y2="560" stroke="#1c2128" stroke-width="1"/>
  <line x1="1100" y1="80" x2="1100" y2="560" stroke="#1c2128" stroke-width="1"/>
  <line x1="620" y1="160" x2="1160" y2="160" stroke="#1c2128" stroke-width="1"/>
  <line x1="620" y1="315" x2="1160" y2="315" stroke="#1c2128" stroke-width="1"/>
  <line x1="620" y1="470" x2="1160" y2="470" stroke="#1c2128" stroke-width="1"/>

  <!-- Title (left side) -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">13</text>
  <text x="60" y="172" font-size="38" fill="#c9d1d9" font-weight="bold">Every blog,</text>
  <text x="60" y="222" font-size="38" fill="#f97316" font-weight="bold">now on Nostr</text>
  <text x="60" y="292" font-size="16" fill="#8b949e">Point it at a feed.</text>
  <text x="60" y="317" font-size="16" fill="#8b949e">Get signed long-form events back.</text>
  <text x="60" y="342" font-size="16" fill="#8b949e">Your archive, finally yours.</text>

  <!-- Format badges -->
  <rect x="60" y="386" width="84" height="28" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
  <text x="102" y="405" text-anchor="middle" font-size="11" fill="#f97316" font-weight="bold">RSS 2.0</text>

  <rect x="154" y="386" width="70" height="28" rx="6" fill="#0d1117" stroke="#FFCA4A" stroke-width="1"/>
  <text x="189" y="405" text-anchor="middle" font-size="11" fill="#FFCA4A" font-weight="bold">Atom</text>

  <rect x="234" y="386" width="100" height="28" rx="6" fill="#0d1117" stroke="#897FFF" stroke-width="1"/>
  <text x="284" y="405" text-anchor="middle" font-size="11" fill="#897FFF" font-weight="bold">JSON Feed</text>

  <!-- Import hint -->
  <text x="60" y="462" font-size="12" fill="#484f58">import { rss } from 'nostr-core'</text>

  <!-- === RSS EMBLEM (right side) === -->
  <!-- Framing ring -->
  <circle cx="893" cy="305" r="172" fill="none" stroke="url(#ring)" stroke-width="1.5" stroke-opacity="0.28" filter="url(#bigGlow)"/>
  <circle cx="893" cy="305" r="160" fill="none" stroke="url(#ring)" stroke-width="2" stroke-opacity="0.55"/>
  <circle cx="893" cy="305" r="155" fill="none" stroke="#30363d" stroke-width="0.5"/>

  <!-- RSS quarter-arcs sweeping up and to the right, origin lower-left -->
  <g stroke-linecap="round" fill="none">
    <path d="M 815 337 A 58 58 0 0 1 873 395" stroke="url(#arc1)" stroke-width="14" filter="url(#softGlow)"/>
    <path d="M 815 285 A 110 110 0 0 1 925 395" stroke="#FFCA4A" stroke-width="14" stroke-opacity="0.85"/>
    <path d="M 815 230 A 165 165 0 0 1 980 395" stroke="#897FFF" stroke-width="12" stroke-opacity="0.6"/>
  </g>
  <!-- Origin dot -->
  <circle cx="815" cy="395" r="15" fill="#f97316" filter="url(#softGlow)"/>
  <circle cx="815" cy="395" r="6" fill="#0d1117"/>

  <!-- Items riding the outer arc into a signed event -->
  <circle cx="924" cy="252" r="3" fill="#897FFF" opacity="0.7"/>
  <circle cx="958" cy="300" r="3" fill="#FFCA4A" opacity="0.7"/>

  <!-- Signed event card -->
  <g transform="translate(965, 360)">
    <rect x="0" y="0" width="118" height="74" rx="8" fill="url(#cardEdge)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="118" height="22" rx="8" fill="#161b22"/>
    <rect x="0" y="14" width="118" height="8" fill="#161b22"/>
    <text x="10" y="16" font-size="9" fill="#8b949e">kind 30024</text>
    <line x1="10" y1="36" x2="84" y2="36" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="46" x2="100" y2="46" stroke="#21262d" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="56" x2="70" y2="56" stroke="#21262d" stroke-width="3" stroke-linecap="round"/>
    <circle cx="98" cy="58" r="10" fill="#0d1117" stroke="#27c93f" stroke-width="1.5"/>
    <path d="M 93 58 l 4 4 l 6 -8" stroke="#27c93f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Watermark -->
  <text x="1160" y="595" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <!-- Bottom accent bar -->
  <rect y="626" width="400" height="4" fill="#f97316"/>
  <rect x="400" y="626" width="400" height="4" fill="#FFCA4A"/>
  <rect x="800" y="626" width="400" height="4" fill="#897FFF"/>
</svg>
