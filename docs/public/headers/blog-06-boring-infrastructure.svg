<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">06</text>
  <text x="60" y="170" font-size="38" fill="#c9d1d9" font-weight="bold">Nostr Needs</text>
  <text x="60" y="220" font-size="38" fill="#c9d1d9" font-weight="bold">Boring</text>
  <text x="60" y="270" font-size="38" fill="#c9d1d9" font-weight="bold">Infrastructure</text>
  <text x="60" y="330" font-size="16" fill="#8b949e">The protocol is interesting.</text>
  <text x="60" y="355" font-size="16" fill="#8b949e">The libraries should be boring.</text>

  <!-- Right side: clean three-layer stack -->
  <rect x="620" y="100" width="520" height="440" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Apps layer (dashed, de-emphasized) -->
  <text x="880" y="145" text-anchor="middle" font-size="12" fill="#484f58">applications</text>

  <rect x="660" y="160" width="140" height="45" rx="6" fill="#0d1117" stroke="#484f58" stroke-width="1" stroke-dasharray="4"/>
  <text x="730" y="188" text-anchor="middle" font-size="11" fill="#484f58">Social Client</text>

  <rect x="815" y="160" width="140" height="45" rx="6" fill="#0d1117" stroke="#484f58" stroke-width="1" stroke-dasharray="4"/>
  <text x="885" y="188" text-anchor="middle" font-size="11" fill="#484f58">Payment App</text>

  <rect x="970" y="160" width="140" height="45" rx="6" fill="#0d1117" stroke="#484f58" stroke-width="1" stroke-dasharray="4"/>
  <text x="1040" y="188" text-anchor="middle" font-size="11" fill="#484f58">Your Thing</text>

  <!-- nostr-core layer (highlighted) -->
  <rect x="660" y="245" width="450" height="100" rx="8" fill="#0d1117" stroke="#f97316" stroke-width="2"/>
  <text x="885" y="285" text-anchor="middle" font-size="18" fill="#f97316" font-weight="bold">nostr-core</text>
  <text x="885" y="315" text-anchor="middle" font-size="12" fill="#8b949e">48 NIPs · typed · vendor-neutral · audited crypto</text>

  <!-- Crypto layer -->
  <rect x="660" y="385" width="450" height="50" rx="6" fill="#0d1117" stroke="#27c93f" stroke-width="1"/>
  <text x="885" y="415" text-anchor="middle" font-size="13" fill="#27c93f">@noble/curves · @noble/hashes · @noble/ciphers</text>

  <!-- Protocol layer -->
  <rect x="660" y="455" width="450" height="45" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="885" y="483" text-anchor="middle" font-size="13" fill="#8b949e">Nostr Protocol · NIPs · secp256k1</text>

  <!-- Watermark -->
  <text x="1160" y="595" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <rect y="626" width="1200" height="4" rx="0" fill="#f97316"/>
</svg>
