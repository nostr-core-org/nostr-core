<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">10</text>
  <text x="60" y="170" font-size="38" fill="#c9d1d9" font-weight="bold">Media Without</text>
  <text x="60" y="220" font-size="38" fill="#c9d1d9" font-weight="bold">Middlemen</text>
  <text x="60" y="280" font-size="16" fill="#8b949e">Content-addressed blobs.</text>
  <text x="60" y="305" font-size="16" fill="#8b949e">Nostr-authenticated. Your server.</text>

  <!-- Badge -->
  <rect x="60" y="340" width="100" height="28" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="110" y="359" text-anchor="middle" font-size="12" fill="#58a6ff">Blossom</text>

  <!-- Right side: clean simple flow -->
  <rect x="620" y="100" width="520" height="440" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- File -->
  <rect x="790" y="130" width="180" height="40" rx="6" fill="#0d1117" stroke="#c9d1d9" stroke-width="1"/>
  <text x="880" y="155" text-anchor="middle" font-size="13" fill="#c9d1d9">image.png</text>

  <line x1="880" y1="170" x2="880" y2="195" stroke="#484f58" stroke-width="1"/>

  <!-- SHA-256 -->
  <text x="880" y="215" text-anchor="middle" font-size="12" fill="#27c93f">sha256: a1b2c3d4...</text>

  <line x1="880" y1="225" x2="880" y2="250" stroke="#484f58" stroke-width="1"/>

  <!-- Blossom server -->
  <rect x="730" y="255" width="300" height="50" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="880" y="278" text-anchor="middle" font-size="14" fill="#58a6ff" font-weight="bold">Your Blossom Server</text>
  <text x="880" y="296" text-anchor="middle" font-size="11" fill="#484f58">same hash = same file, any server</text>

  <line x1="880" y1="305" x2="880" y2="330" stroke="#484f58" stroke-width="1"/>

  <!-- Auth -->
  <rect x="760" y="335" width="240" height="35" rx="5" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
  <text x="880" y="358" text-anchor="middle" font-size="12" fill="#f97316">Auth: kind 24242, Nostr signed</text>

  <!-- Separator -->
  <line x1="660" y1="395" x2="1100" y2="395" stroke="#21262d" stroke-width="1"/>

  <!-- Clean operation list -->
  <text x="660" y="425" font-size="12" fill="#58a6ff">upload</text>
  <text x="780" y="425" font-size="12" fill="#27c93f">get</text>
  <text x="860" y="425" font-size="12" fill="#ffbd2e">mirror</text>
  <text x="960" y="425" font-size="12" fill="#8b949e">list</text>
  <text x="1030" y="425" font-size="12" fill="#ff5f56">delete</text>

  <!-- Key points -->
  <text x="660" y="465" font-size="11" fill="#484f58">No API keys. No accounts. Nostr key = credential.</text>
  <text x="660" y="490" font-size="11" fill="#484f58">User-controlled server list (kind 10063).</text>
  <text x="660" y="515" font-size="11" fill="#484f58">Run your own server. Charge for storage. Your rules.</text>

  <!-- Watermark -->
  <text x="1160" y="595" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <rect y="626" width="1200" height="4" rx="0" fill="#58a6ff"/>
</svg>
