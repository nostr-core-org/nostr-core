<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">08</text>
  <text x="60" y="170" font-size="38" fill="#c9d1d9" font-weight="bold">Ecash on Nostr</text>
  <text x="60" y="240" font-size="16" fill="#8b949e">Wallet state on relays.</text>
  <text x="60" y="265" font-size="16" fill="#8b949e">Proofs travel with your keys.</text>

  <!-- NIP-60 badge -->
  <rect x="60" y="300" width="100" height="28" rx="4" fill="#161b22" stroke="#27c93f" stroke-width="1"/>
  <text x="110" y="319" text-anchor="middle" font-size="12" fill="#27c93f">NIP-60</text>

  <!-- Right side: event kinds diagram -->
  <rect x="620" y="100" width="520" height="440" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <text x="880" y="140" text-anchor="middle" font-size="13" fill="#484f58">nip60 event kinds</text>

  <!-- Kind 17375 - Wallet -->
  <rect x="660" y="165" width="440" height="55" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
  <text x="680" y="190" font-size="13" fill="#f97316" font-weight="bold">kind 17375</text>
  <text x="820" y="190" font-size="13" fill="#c9d1d9">Wallet</text>
  <text x="680" y="210" font-size="11" fill="#484f58">privkey + mint list, encrypted to self</text>

  <!-- Kind 7375 - Tokens -->
  <rect x="660" y="235" width="440" height="55" rx="6" fill="#0d1117" stroke="#27c93f" stroke-width="1"/>
  <text x="680" y="260" font-size="13" fill="#27c93f" font-weight="bold">kind 7375</text>
  <text x="820" y="260" font-size="13" fill="#c9d1d9">Token</text>
  <text x="680" y="280" font-size="11" fill="#484f58">unspent Cashu proofs per mint</text>

  <!-- Kind 7376 - History -->
  <rect x="660" y="305" width="440" height="55" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
  <text x="680" y="330" font-size="13" fill="#58a6ff" font-weight="bold">kind 7376</text>
  <text x="820" y="330" font-size="13" fill="#c9d1d9">History</text>
  <text x="680" y="350" font-size="11" fill="#484f58">direction, amount, event refs</text>

  <!-- Kind 7374 - Quote -->
  <rect x="660" y="375" width="440" height="55" rx="6" fill="#0d1117" stroke="#ffbd2e" stroke-width="1"/>
  <text x="680" y="400" font-size="13" fill="#ffbd2e" font-weight="bold">kind 7374</text>
  <text x="820" y="400" font-size="13" fill="#c9d1d9">Quote</text>
  <text x="680" y="420" font-size="11" fill="#484f58">pending mint quote, auto-expires</text>

  <!-- Encryption note -->
  <line x1="660" y1="450" x2="1100" y2="450" stroke="#21262d" stroke-width="1"/>
  <text x="660" y="480" font-size="12" fill="#27c93f">All content NIP-44 encrypted to self</text>
  <text x="660" y="505" font-size="12" fill="#484f58">Relays see encrypted blobs. Only your key decrypts.</text>

  <!-- Watermark -->
  <text x="1160" y="595" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <rect y="626" width="1200" height="4" rx="0" fill="#27c93f"/>
</svg>
