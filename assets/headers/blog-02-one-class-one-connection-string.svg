<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">02</text>
  <text x="60" y="160" font-size="36" fill="#c9d1d9" font-weight="bold">One Class,</text>
  <text x="60" y="205" font-size="36" fill="#c9d1d9" font-weight="bold">One Connection</text>
  <text x="60" y="250" font-size="36" fill="#c9d1d9" font-weight="bold">String</text>
  <text x="60" y="305" font-size="16" fill="#8b949e">The entire NWC spec</text>
  <text x="60" y="330" font-size="16" fill="#8b949e">in five lines of code</text>

  <!-- Right side: code example -->
  <rect x="580" y="80" width="560" height="490" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Code lines -->
  <text x="610" y="120" font-size="13" fill="#484f58">// That's the whole thing</text>
  <text x="610" y="155" font-size="14" fill="#ff5f56">import</text>
  <text x="670" y="155" font-size="14" fill="#c9d1d9">{ NWC }</text>
  <text x="740" y="155" font-size="14" fill="#ff5f56">from</text>
  <text x="785" y="155" font-size="14" fill="#27c93f">'nostr-core'</text>

  <text x="610" y="195" font-size="14" fill="#ff5f56">const</text>
  <text x="660" y="195" font-size="14" fill="#58a6ff">nwc</text>
  <text x="695" y="195" font-size="14" fill="#c9d1d9">=</text>
  <text x="710" y="195" font-size="14" fill="#ff5f56">new</text>
  <text x="745" y="195" font-size="14" fill="#ffbd2e">NWC</text>
  <text x="775" y="195" font-size="14" fill="#c9d1d9">(</text>
  <text x="785" y="195" font-size="14" fill="#27c93f">connString</text>
  <text x="890" y="195" font-size="14" fill="#c9d1d9">)</text>

  <text x="610" y="225" font-size="14" fill="#ff5f56">await</text>
  <text x="665" y="225" font-size="14" fill="#58a6ff">nwc</text>
  <text x="695" y="225" font-size="14" fill="#c9d1d9">.connect()</text>

  <text x="610" y="265" font-size="14" fill="#484f58">// Pay</text>
  <text x="610" y="295" font-size="14" fill="#ff5f56">await</text>
  <text x="665" y="295" font-size="14" fill="#58a6ff">nwc</text>
  <text x="695" y="295" font-size="14" fill="#c9d1d9">.payInvoice(</text>
  <text x="810" y="295" font-size="14" fill="#27c93f">'lnbc...'</text>
  <text x="890" y="295" font-size="14" fill="#c9d1d9">)</text>

  <text x="610" y="335" font-size="14" fill="#484f58">// Receive</text>
  <text x="610" y="365" font-size="14" fill="#ff5f56">await</text>
  <text x="665" y="365" font-size="14" fill="#58a6ff">nwc</text>
  <text x="695" y="365" font-size="14" fill="#c9d1d9">.makeInvoice({ amount: 50000 })</text>

  <text x="610" y="405" font-size="14" fill="#484f58">// Check</text>
  <text x="610" y="435" font-size="14" fill="#ff5f56">await</text>
  <text x="665" y="435" font-size="14" fill="#58a6ff">nwc</text>
  <text x="695" y="435" font-size="14" fill="#c9d1d9">.getBalance()</text>

  <text x="610" y="475" font-size="14" fill="#484f58">// Done</text>
  <text x="610" y="505" font-size="14" fill="#58a6ff">nwc</text>
  <text x="640" y="505" font-size="14" fill="#c9d1d9">.close()</text>

  <!-- Watermark -->
  <text x="1160" y="600" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <rect y="626" width="1200" height="4" rx="0" fill="#f97316"/>
</svg>
