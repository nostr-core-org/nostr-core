<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">03</text>
  <text x="60" y="170" font-size="38" fill="#c9d1d9" font-weight="bold">Build a Nostr</text>
  <text x="60" y="220" font-size="38" fill="#c9d1d9" font-weight="bold">Client From</text>
  <text x="60" y="270" font-size="38" fill="#c9d1d9" font-weight="bold">Scratch</text>
  <text x="60" y="330" font-size="16" fill="#8b949e">Keys, events, relays, encryption,</text>
  <text x="60" y="355" font-size="16" fill="#8b949e">threads, reactions - all in one import</text>

  <!-- Right side: simple layered stack -->
  <rect x="620" y="100" width="520" height="440" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="880" y="140" text-anchor="middle" font-size="13" fill="#484f58">your-nostr-client</text>

  <!-- Your App -->
  <rect x="660" y="160" width="440" height="50" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
  <text x="880" y="190" text-anchor="middle" font-size="15" fill="#f97316" font-weight="bold">Your Application</text>

  <!-- nostr-core -->
  <rect x="660" y="230" width="440" height="50" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1" stroke-dasharray="4"/>
  <text x="880" y="260" text-anchor="middle" font-size="14" fill="#f97316">nostr-core</text>

  <!-- Capabilities - simple text list, no boxes -->
  <text x="680" y="310" font-size="13" fill="#58a6ff">Keys</text>
  <text x="780" y="310" font-size="12" fill="#484f58">generate, import, NIP-07 extensions</text>

  <text x="680" y="340" font-size="13" fill="#27c93f">Events</text>
  <text x="780" y="340" font-size="12" fill="#484f58">sign, verify, threads, reactions</text>

  <text x="680" y="370" font-size="13" fill="#ffbd2e">Encryption</text>
  <text x="780" y="370" font-size="12" fill="#484f58">DMs, gift wrapping, sealed messages</text>

  <text x="680" y="400" font-size="13" fill="#ff5f56">Payments</text>
  <text x="780" y="400" font-size="12" fill="#484f58">NWC, zaps, Lightning addresses</text>

  <text x="680" y="430" font-size="13" fill="#c9d1d9">Content</text>
  <text x="780" y="430" font-size="12" fill="#484f58">long-form, channels, calendar, badges</text>

  <!-- Relays -->
  <rect x="660" y="460" width="440" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="880" y="490" text-anchor="middle" font-size="14" fill="#8b949e">Relay · RelayPool</text>

  <!-- Watermark -->
  <text x="1160" y="595" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <rect y="626" width="1200" height="4" rx="0" fill="#f97316"/>
</svg>
