<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f1319"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="glow1" x1="600" y1="200" x2="900" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#897FFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="compassRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#FFCA4A"/>
      <stop offset="100%" stop-color="#897FFF"/>
    </linearGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#FFCA4A"/>
    </linearGradient>
    <linearGradient id="needleSouth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#484f58"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
    <radialGradient id="compassGlow" cx="880" cy="315" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#897FFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  </style>

  <!-- Background -->
  <rect width="1200" height="630" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Ambient glow -->
  <ellipse cx="880" cy="315" rx="320" ry="280" fill="url(#compassGlow)"/>

  <!-- Terminal chrome -->
  <rect width="1200" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="1200" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#27c93f"/>

  <!-- Faint grid lines (star chart / navigation feel) -->
  <line x1="620" y1="80" x2="620" y2="580" stroke="#1c2128" stroke-width="1"/>
  <line x1="780" y1="80" x2="780" y2="580" stroke="#1c2128" stroke-width="1"/>
  <line x1="940" y1="80" x2="940" y2="580" stroke="#1c2128" stroke-width="1"/>
  <line x1="1100" y1="80" x2="1100" y2="580" stroke="#1c2128" stroke-width="1"/>
  <line x1="620" y1="160" x2="1160" y2="160" stroke="#1c2128" stroke-width="1"/>
  <line x1="620" y1="315" x2="1160" y2="315" stroke="#1c2128" stroke-width="1"/>
  <line x1="620" y1="470" x2="1160" y2="470" stroke="#1c2128" stroke-width="1"/>

  <!-- Title (left side) -->
  <text x="60" y="110" font-size="14" fill="#f97316" font-weight="bold">11</text>
  <text x="60" y="175" font-size="40" fill="#c9d1d9" font-weight="bold">Navigate</text>
  <text x="60" y="225" font-size="40" fill="#f97316" font-weight="bold">Nostr</text>
  <text x="60" y="295" font-size="16" fill="#8b949e">A compass for the protocol.</text>
  <text x="60" y="320" font-size="16" fill="#8b949e">NIPs. LUDs. NUTs. BUDs.</text>
  <text x="60" y="345" font-size="16" fill="#8b949e">One skill to find them all.</text>

  <!-- Spec labels (left, below title) -->
  <rect x="60" y="390" width="70" height="28" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
  <text x="95" y="409" text-anchor="middle" font-size="11" fill="#f97316" font-weight="bold">NIPs</text>

  <rect x="140" y="390" width="70" height="28" rx="6" fill="#0d1117" stroke="#FFCA4A" stroke-width="1"/>
  <text x="175" y="409" text-anchor="middle" font-size="11" fill="#FFCA4A" font-weight="bold">LUDs</text>

  <rect x="220" y="390" width="70" height="28" rx="6" fill="#0d1117" stroke="#897FFF" stroke-width="1"/>
  <text x="255" y="409" text-anchor="middle" font-size="11" fill="#897FFF" font-weight="bold">NUTs</text>

  <rect x="300" y="390" width="70" height="28" rx="6" fill="#0d1117" stroke="#27c93f" stroke-width="1"/>
  <text x="335" y="409" text-anchor="middle" font-size="11" fill="#27c93f" font-weight="bold">BUDs</text>

  <!-- Module map hint -->
  <text x="60" y="465" font-size="12" fill="#484f58">import { nip57, lnurl, nip60, blossom } from 'nostr-core'</text>

  <!-- === COMPASS (right side) === -->
  <g transform="translate(880, 315)">

    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="170" fill="none" stroke="url(#compassRing)" stroke-width="1.5" stroke-opacity="0.3" filter="url(#bigGlow)"/>

    <!-- Outer compass ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#compassRing)" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="155" fill="none" stroke="#30363d" stroke-width="0.5"/>

    <!-- Tick marks (32 points) -->
    <g stroke="#30363d" stroke-width="1">
      <line x1="0" y1="-150" x2="0" y2="-140"/>
      <line x1="0" y1="140" x2="0" y2="150"/>
      <line x1="-150" y1="0" x2="-140" y2="0"/>
      <line x1="140" y1="0" x2="150" y2="0"/>
    </g>
    <!-- Major ticks (orange) -->
    <g stroke="#f97316" stroke-width="2">
      <line x1="0" y1="-155" x2="0" y2="-138"/>
      <line x1="0" y1="138" x2="0" y2="155"/>
      <line x1="-155" y1="0" x2="-138" y2="0"/>
      <line x1="138" y1="0" x2="155" y2="0"/>
    </g>
    <!-- Diagonal ticks -->
    <g stroke="#484f58" stroke-width="1">
      <line x1="100" y1="-100" x2="106" y2="-106" transform="rotate(0)"/>
      <line x1="-100" y1="-100" x2="-106" y2="-106"/>
      <line x1="100" y1="100" x2="106" y2="106"/>
      <line x1="-100" y1="100" x2="-106" y2="106"/>
    </g>

    <!-- Cardinal labels -->
    <text x="0" y="-118" text-anchor="middle" font-size="14" fill="#f97316" font-weight="bold">NIPs</text>
    <text x="0" y="130" text-anchor="middle" font-size="14" fill="#897FFF" font-weight="bold">NUTs</text>
    <text x="-120" y="5" text-anchor="middle" font-size="14" fill="#FFCA4A" font-weight="bold">LUDs</text>
    <text x="120" y="5" text-anchor="middle" font-size="14" fill="#27c93f" font-weight="bold">BUDs</text>

    <!-- Inner rings -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#21262d" stroke-width="1"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#21262d" stroke-width="1"/>

    <!-- Inner detail labels -->
    <text x="62" y="-62" font-size="9" fill="#484f58">NIP-47</text>
    <text x="-85" y="-62" font-size="9" fill="#484f58" text-anchor="end">NIP-44</text>
    <text x="62" y="70" font-size="9" fill="#484f58">NIP-60</text>
    <text x="-85" y="70" font-size="9" fill="#484f58" text-anchor="end">NIP-57</text>

    <!-- Small dots at intercardinal positions -->
    <circle cx="64" cy="-64" r="2" fill="#f97316" opacity="0.5"/>
    <circle cx="-64" cy="-64" r="2" fill="#FFCA4A" opacity="0.5"/>
    <circle cx="64" cy="64" r="2" fill="#27c93f" opacity="0.5"/>
    <circle cx="-64" cy="64" r="2" fill="#897FFF" opacity="0.5"/>

    <!-- Compass needle (north = orange/gold, points to NIPs) -->
    <g filter="url(#softGlow)">
      <!-- North needle -->
      <polygon points="0,-105 -8,0 0,-15 8,0" fill="url(#needle)" opacity="0.9"/>
      <!-- South needle -->
      <polygon points="0,105 -8,0 0,15 8,0" fill="url(#needleSouth)" opacity="0.7"/>
    </g>

    <!-- Center pin -->
    <circle cx="0" cy="0" r="8" fill="#161b22" stroke="#f97316" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#f97316"/>
  </g>

  <!-- Watermark -->
  <text x="1160" y="595" text-anchor="end" font-size="11" fill="#30363d">nostr-core</text>

  <!-- Bottom accent bar -->
  <rect y="626" width="400" height="4" rx="0" fill="#f97316"/>
  <rect x="400" y="626" width="400" height="4" rx="0" fill="#FFCA4A"/>
  <rect x="800" y="626" width="400" height="4" rx="0" fill="#897FFF"/>
</svg>
